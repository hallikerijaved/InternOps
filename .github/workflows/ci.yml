name: InternOps CI

on:
  push:
    branches: [ master, 'feature/*' ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: internops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/internops_test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      SEED_ADMIN_EMAIL: admin@internops.com
      SEED_ADMIN_PASSWORD: Admin@123

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        shell: bash
        run: |
          if [ -f backend/package-lock.json ]; then
            cd backend && npm ci
          else
            echo "backend/package-lock.json not found; falling back to npm install"
            cd backend && npm install
          fi

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run migrations
        run: cd backend && npm run migrate

      - name: Seed test data
        run: cd backend && npm run seed

      - name: Run Jest tests
        run: cd backend && npm test -- --forceExit --detectOpenHandles --runInBand

      - name: Install frontend dependencies
        shell: bash
        run: |
          if [ -f frontend/package-lock.json ]; then
            cd frontend && npm ci
          else
            echo "frontend/package-lock.json not found; falling back to npm install"
            cd frontend && npm install
          fi

      - name: Build frontend
        run: cd frontend && npm run build
